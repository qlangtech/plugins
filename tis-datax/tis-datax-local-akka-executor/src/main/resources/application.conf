# TIS DAG Akka Configuration

akka {
  actor {
    provider = "cluster"

    # Kryo serialization
    serializers {
      kryo = "io.altoo.akka.serialization.kryo.KryoSerializer"
    }

    serialization-bindings {
      "java.io.Serializable" = kryo
    }

    # Allow Java serialization for compatibility
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  remote {
    artery {
      canonical.hostname = "127.0.0.1"
      canonical.hostname = ${?AKKA_HOSTNAME}
      canonical.port = 2551
      canonical.port = ${?AKKA_PORT}
    }
  }

  cluster {
    # Seed nodes - default to single node cluster
    seed-nodes = ["akka://TIS-DAG-System@127.0.0.1:2551"]
    seed-nodes = ${?AKKA_SEED_NODES}

    # Split Brain Resolver
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    split-brain-resolver {
      # Keep majority strategy
      active-strategy = keep-majority
      stable-after = 20s
    }

    # Roles
    roles = ["scheduler", "worker"]
  }

  # Logging
  loglevel = "INFO"
  stdout-loglevel = "INFO"

  log-dead-letters = 10
  log-dead-letters-during-shutdown = off
}

# Kryo serialization configuration
akka-kryo-serialization {
  type = "graph"
  idstrategy = "default"

  # Buffer size
  buffer-size = 4096

  # Max buffer size
  max-buffer-size = -1

  # Use manifests
  use-manifests = false

  # Use unsafe
  use-unsafe = false

  # Post serialization transformations
  post-serialization-transformations = "off"

  # Implicit registration
  implicit-registration-logging = false

  # Kryo trace
  kryo-trace = false

  # Resolve subclasses
  resolve-subclasses = true
}
